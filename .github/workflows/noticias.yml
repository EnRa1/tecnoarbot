name: Pipeline de noticias tecno.ar

on:
  schedule:
    # Ejemplo: 9:00, 14:00 y 20:00 hora Argentina (UTC-3) = 12:00, 17:00, 23:00 UTC
    - cron: "0 12,17,23 * * 1-5"
  workflow_dispatch: {}  # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  generar-noticias:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python pipeline.py

      - name: Commitear resultados
        run: |
          git config user.name "tecno-ar-bot"
          git config user.email "bot@users.noreply.github.com"
          mkdir -p noticias  # evita que git add falle si no se generó ninguna nota
          git add noticias/ historial_publicadas.json enlaces_internos.json
          git commit -m "Noticias generadas: $(date +'%Y-%m-%d %H:%M')" || echo "sin cambios para commitear"
          git push

          git config user.email "bot@users.noreply.github.com"
          git add noticias/ historial_publicadas.json enlaces_internos.json
          git commit -m "Noticias generadas: $(date +'%Y-%m-%d %H:%M')" || echo "sin cambios para commitear"
          git push
